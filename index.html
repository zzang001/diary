<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 공감 다이어리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FDF6EC;
      --primary: #C17B4E;
      --secondary: #E8A87C;
      --text: #4A3728;
      --text-light: #7A6255;
      --white: #ffffff;
      --border: #EDD9C5;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(193,123,78,0.10);
      --shadow-md: 0 4px 20px rgba(193,123,78,0.15);
    }

    body {
      font-family: "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title span { font-size: 20px; }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 10px;
      color: var(--text-light);
      font-size: 20px;
      transition: background 0.18s;
      display: flex;
      align-items: center;
    }

    .btn-icon:hover { background: var(--bg); color: var(--primary); }

    .layout {
      display: flex;
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px;
      gap: 20px;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-light);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0 4px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: var(--white);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      border: 1.5px solid transparent;
      box-shadow: var(--shadow);
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .history-item:hover { border-color: var(--secondary); box-shadow: var(--shadow-md); }
    .history-item.active { border-color: var(--primary); }

    .history-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .history-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .history-tag {
      font-size: 11px;
      color: var(--primary);
      background: #FEF0E4;
      border-radius: 20px;
      padding: 2px 7px;
    }

    .history-empty {
      text-align: center;
      color: var(--text-light);
      font-size: 13px;
      padding: 24px 8px;
      background: var(--white);
      border-radius: 12px;
      box-shadow: var(--shadow);
      line-height: 1.7;
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .date-label {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }

    .textarea-wrap { position: relative; }

    textarea {
      width: 100%;
      min-height: 180px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px 16px 32px 16px;
      font-family: "Noto Sans KR", sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      resize: vertical;
      outline: none;
      line-height: 1.7;
      transition: border-color 0.18s;
    }

    textarea:focus { border-color: var(--primary); }
    textarea::placeholder { color: #B9A090; }

    .char-count {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 12px;
      color: var(--text-light);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-family: "Noto Sans KR", sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, opacity 0.18s;
      margin-top: 12px;
    }

    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary:not(:disabled):hover { background: #A0623A; }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      color: var(--primary);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 11px 22px;
      font-family: "Noto Sans KR", sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s;
      margin-top: 12px;
    }

    .btn-secondary:hover { background: #FEF0E4; }

    /* AI Response */
    .ai-response-area { display: none; }
    .ai-response-area.visible { display: block; }

    .response-divider {
      border: none;
      border-top: 1.5px solid var(--border);
      margin: 20px 0;
    }

    .response-header {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-light);
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .emotion-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .emotion-chip {
      font-size: 13px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 20px;
    }

    .ai-message {
      font-size: 15px;
      line-height: 1.85;
      color: var(--text);
      background: var(--bg);
      border-radius: 12px;
      padding: 18px 20px;
      border-left: 3px solid var(--secondary);
    }

    /* Loading dots */
    .loading-dots {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 20px 0;
    }

    .loading-dots.active { display: flex; }

    .loading-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--secondary);
      animation: dot-blink 1.4s infinite both;
      flex-shrink: 0;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    .loading-text {
      margin-left: 8px;
      font-size: 13px;
      font-style: normal;
      color: var(--text-light);
      line-height: 1.4;
    }

    @keyframes dot-blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Read-only banner */
    .readonly-banner {
      display: none;
      background: #FFF3CC;
      border: 1px solid #E0C85A;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 13px;
      color: #7A5A00;
      margin-bottom: 4px;
    }

    .readonly-banner.visible { display: block; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(74,55,40,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 20px;
      padding: 32px;
      width: 90%;
      max-width: 440px;
      box-shadow: var(--shadow-md);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .modal-desc {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .modal label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .modal input[type="text"], .modal input[type="password"] {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-family: "Noto Sans KR", sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.18s;
    }

    .modal input:focus { border-color: var(--primary); }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-modal-cancel {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      font-family: "Noto Sans KR", sans-serif;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-light);
    }

    .btn-modal-cancel:hover { background: var(--bg); }

    .btn-modal-save {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-family: "Noto Sans KR", sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-modal-save:hover { background: #A0623A; }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .toast {
      background: var(--text);
      color: #fff;
      border-radius: 30px;
      padding: 11px 24px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      animation: toast-in 0.25s ease;
      white-space: nowrap;
    }

    .toast.error { background: #B85050; }
    .toast.success { background: #3A7A5A; }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .layout { flex-direction: column; padding: 16px 12px; }
      .sidebar { width: 100%; }
      .history-list { flex-direction: row; overflow-x: auto; padding-bottom: 4px; }
      .history-item { min-width: 130px; flex-shrink: 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <span>✦</span> AI 공감 다이어리
  </div>
  <button class="btn-icon" id="btnSettings" title="설정" style="display:none;">⚙️</button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">히스토리</div>
    <div class="history-list" id="historyList"></div>
  </aside>

  <main class="main">
    <div class="card">
      <div class="date-label" id="dateLabel"></div>
      <div class="readonly-banner" id="readonlyBanner">
        📖 이전 날짜의 일기입니다. 읽기 전용으로 표시됩니다.
      </div>
      <div class="textarea-wrap">
        <textarea
          id="diaryTextarea"
          placeholder="오늘 하루 어떤 일이 있었나요? 마음속에 담아두었던 이야기를 편하게 적어주세요..."
          maxlength="2000"
          autocomplete="off"
        ></textarea>
        <span class="char-count" id="charCount">0 / 2000</span>
      </div>
      <button class="btn-primary" id="btnSendAI" disabled>
        AI에게 마음 전하기 →
      </button>

      <div class="ai-response-area" id="aiResponseArea">
        <hr class="response-divider" />
        <div class="loading-dots" id="loadingDots">
          <span></span><span></span><span></span>
          <em class="loading-text">마음이음이 읽고 있어요...</em>
        </div>
        <div id="responseContent" style="display:none;">
          <div class="response-header">💬 마음이음의 공감</div>
          <div class="emotion-tags" id="emotionTags"></div>
          <div class="ai-message" id="aiMessage"></div>
        </div>
      </div>

      <div id="saveButtonWrap" style="display:none; margin-top:4px;">
        <button class="btn-secondary" id="btnSave">
          💾 오늘 일기 저장하기
        </button>
      </div>
    </div>
  </main>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">⚙️ API 설정</div>
    <div class="modal-desc">OpenRouter API 키를 입력하세요. 키는 브라우저 로컬 스토리지에만 저장됩니다.</div>
    <label for="apiKeyInput">API 키</label>
    <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." />
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="btnModalCancel">취소</button>
      <button class="btn-modal-save" id="btnModalSave">저장</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  const DEFAULT_API_KEY = atob("c2stb3ItdjEtOTllNDgzMWQ5ODgxM2E4ZTQwNDAzMjRkNjFhZjc1ZDA5OWUyZjM0NjU4NjFmMjFjNWYwNmFhZGNjOWIzMDFhNw==");
  const MODEL = "openrouter/free";
  const ENDPOINT = "https://openrouter.ai/api/v1/chat/completions";

  const SYSTEM_PROMPT = `당신은 "마음이음"이라는 이름의 따뜻하고 공감 능력이 뛰어난 AI 감성 상담사입니다.
사용자가 오늘 하루 있었던 일을 일기 형식으로 작성하면, 당신은 그 내용을 깊이 읽고
진심 어린 공감과 위로의 말을 건네는 역할을 합니다.

[당신의 핵심 역할]
1. 사용자의 감정을 정확하게 감지하고 언어로 표현해 준다.
2. 사용자가 느낀 감정이 자연스럽고 타당하다는 것을 인정해 준다.
3. 판단하거나 평가하지 않고, 있는 그대로 공감한다.
4. 해결책이나 조언은 사용자가 명시적으로 요청하지 않는 한 제시하지 않는다.
5. 일기 속 구체적인 상황이나 표현을 언급하여 "진짜로 읽었음"을 느끼게 한다.

[응답 형식 - 반드시 아래 JSON 형식으로만 응답하세요]
{
  "emotions": ["감정키워드1", "감정키워드2", "감정키워드3"],
  "message": "공감 메시지 본문"
}

[emotions 작성 규칙]
- 2개 이상 4개 이하의 감정 키워드를 배열로 작성한다.
- 키워드는 2~5글자의 한국어 명사형으로 작성한다. (예: "외로움", "뿌듯함", "억울함", "피로감")
- 단순한 형용사(예: "슬픈")가 아닌 감정 명사형(예: "슬픔")을 사용한다.
- 사용자가 직접 표현한 감정뿐 아니라, 행간에서 느껴지는 감정도 포함한다.

[message 작성 규칙]
- 3문장 이상 5문장 이하로 작성한다.
- 첫 문장은 반드시 사용자의 하루를 직접적으로 언급하며 시작한다.
- 따뜻하고 부드러운 구어체를 사용한다. ("~군요", "~네요", "~겠어요" 등)
- "다 잘 될 거예요", "파이팅!" 같은 공허한 응원은 절대 사용하지 않는다.
- 사용자의 감정을 무효화하는 표현(예: "그래도 좋은 점을 찾아봐요")은 사용하지 않는다.
- 마지막 문장은 사용자가 오늘 하루를 잘 버텼다는 것을 조용히 인정하는 내용으로 끝낸다.
- 메시지 전체 길이는 150자 이상 300자 이하로 유지한다.

[절대 하지 말아야 할 것]
- JSON 형식 외의 텍스트 출력 (인사말, 설명 등 절대 금지)
- 종교적 발언이나 특정 가치관 강요
- 의학적 진단이나 치료 제안
- 사용자를 가르치려 하거나 훈계하는 말투
- "AI이지만..." 같은 자신의 정체성에 대한 언급`;

  const FALLBACK = { emotions: ["위로"], message: "오늘 하루도 수고하셨어요. 당신의 마음을 충분히 느끼고 있어요." };

  const EMOTION_COLORS = {

    "허탈": { bg: "#E5E5E5", fg: "#5A5A5A" },

  function getEmotionColor(keyword) {
    for (const [k, v] of Object.entries(EMOTION_COLORS)) {
      if (keyword.includes(k) || k.includes(keyword)) return v;
    }
    return { bg: "#D4F7E5", fg: "#2A8B5C" };
  }

  function formatDateLabel(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    const days = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
    return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}`;
  }

  function formatDateShort(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    return `${d.getMonth()+1}월 ${d.getDate()}일`;
  }

  function getTodayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }

  function getEntries() {
    try { return JSON.parse(localStorage.getItem("diary_entries") || "[]"); }
    catch { return []; }
  }

  function saveEntries(entries) {
    localStorage.setItem("diary_entries", JSON.stringify(entries));
  }

  function getApiKey() {
    return localStorage.getItem("openrouter_api_key") || "";
  }

  function showToast(msg, type = "") {
    const c = document.getElementById("toastContainer");
    const t = document.createElement("div");
    t.className = "toast" + (type ? " " + type : "");
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // State
  let currentDateStr = getTodayStr();

  let isReadOnly = false;

  // Elements
  const dateLabel = document.getElementById("dateLabel");
  const diaryTextarea = document.getElementById("diaryTextarea");
  const charCount = document.getElementById("charCount");
  const btnSendAI = document.getElementById("btnSendAI");
  const aiResponseArea = document.getElementById("aiResponseArea");
  const loadingDots = document.getElementById("loadingDots");
  const responseContent = document.getElementById("responseContent");
  const emotionTags = document.getElementById("emotionTags");
  const aiMessage = document.getElementById("aiMessage");
  const saveButtonWrap = document.getElementById("saveButtonWrap");
  const btnSave = document.getElementById("btnSave");
  const historyList = document.getElementById("historyList");
  const readonlyBanner = document.getElementById("readonlyBanner");
  const modalOverlay = document.getElementById("modalOverlay");
  const apiKeyInput = document.getElementById("apiKeyInput");
  const btnModalSave = document.getElementById("btnModalSave");
  const btnModalCancel = document.getElementById("btnModalCancel");
  const btnSettings = document.getElementById("btnSettings");

  function renderDateLabel(dateStr) {
    dateLabel.textContent = formatDateLabel(dateStr);
  }

  function renderHistory() {
    const entries = getEntries().slice().sort((a, b) => b.date.localeCompare(a.date));
    if (entries.length === 0) {
      historyList.innerHTML = `<div class="history-empty">아직 저장된 일기가 없어요.<br>오늘의 이야기를 들려주세요 💛</div>`;
      return;
    }
    historyList.innerHTML = entries.map(e => `
      <div class="history-item${currentDateStr === e.date ? " active" : ""}" data-date="${e.date}">
        <div class="history-date">${formatDateShort(e.date)}</div>
        <div class="history-tags">
          ${(e.emotions || []).map(em => `<span class="history-tag">#${em}</span>`).join("")}
        </div>
      </div>
    `).join("");

    historyList.querySelectorAll(".history-item").forEach(el => {
      el.addEventListener("click", () => loadEntry(el.dataset.date));
    });
  }

  function loadEntry(dateStr) {
    const today = getTodayStr();
    const entries = getEntries();
    const entry = entries.find(e => e.date === dateStr);
    currentDateStr = dateStr;
    isReadOnly = (dateStr !== today);
    pendingAIResult = null;

    renderDateLabel(dateStr);
    readonlyBanner.classList.toggle("visible", isReadOnly);

    if (entry) {
      diaryTextarea.value = entry.content || "";
      diaryTextarea.disabled = isReadOnly;
      charCount.textContent = `${(entry.content||"").length} / 2000`;

      if (entry.aiResponse) {
        showAIResult({ emotions: entry.emotions || [], message: entry.aiResponse }, false);
      } else {
        hideAIResult();
      }
      saveButtonWrap.style.display = "none";
    } else {
      diaryTextarea.value = "";
      diaryTextarea.disabled = false;
      charCount.textContent = "0 / 2000";
      hideAIResult();
      saveButtonWrap.style.display = "none";
    }

    btnSendAI.disabled = diaryTextarea.value.trim().length === 0 || isReadOnly;
    renderHistory();
  }

  function hideAIResult() {
    aiResponseArea.classList.remove("visible");
    loadingDots.classList.remove("active");
    responseContent.style.display = "none";
  }

  function showAIResult(result, showSaveButton = true) {
    aiResponseArea.classList.add("visible");
    loadingDots.classList.remove("active");
    responseContent.style.display = "block";

    emotionTags.innerHTML = (result.emotions || []).map(em => {
      const c = getEmotionColor(em);
      return `<span class="emotion-chip" style="background:${c.bg};color:${c.fg};">${em}</span>`;
    }).join("");

    aiMessage.textContent = result.message || "";

    if (showSaveButton && !isReadOnly) {
      saveButtonWrap.style.display = "block";
    } else {
      saveButtonWrap.style.display = "none";
    }
  }

  function parseAIResponse(text) {
    // 마크다운 코드 블록 제거 후 파싱 시도
    const stripped = text.replace(/```(?:json)?\s*/gi, '').replace(/```/g, '').trim();
    try {
      return JSON.parse(stripped);
    } catch {}
    // 원본 텍스트에서 JSON 객체 추출 시도
    const match = text.match(/\{[\s\S]*?\}/);
    if (match) {
      try { return JSON.parse(match[0]); } catch {}
    }
    // 탐욕적 매칭으로 한 번 더 시도
    const greedyMatch = text.match(/\{[\s\S]*\}/);
    if (greedyMatch) {
      try { return JSON.parse(greedyMatch[0]); } catch {}
    }
    return null;
  }

  async function fetchAI(content, apiKey) {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${apiKey}`,
        "Content-Type": "application/json",
        "HTTP-Referer": "https://ai-empathy-diary.local",
        "X-Title": "AI Empathy Diary"
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          { role: "user", content: content }
        ]
      })
    });

    if (res.status === 401) { showToast("API 키를 확인해주세요", "error"); return "AUTH_ERROR"; }
    if (res.status === 429) { showToast("잠시 후 다시 시도해주세요 (요청 한도 초과)", "error"); return "RATE_LIMIT"; }
    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      console.error("[AI 다이어리] API 오류:", res.status, errBody);
      return "API_ERROR";
    }

    const data = await res.json();
    const rawText = data?.choices?.[0]?.message?.content || "";
    console.log("[AI 다이어리] 응답 원문:", rawText);
    return parseAIResponse(rawText);
  }

  async function callAI() {
    const apiKey = getApiKey();
    if (!apiKey) {
      openSettingsModal(true);
      return;
    }

    const content = diaryTextarea.value.trim();
    if (!content) return;

    btnSendAI.disabled = true;
    aiResponseArea.classList.add("visible");
    loadingDots.classList.add("active");
    responseContent.style.display = "none";
    saveButtonWrap.style.display = "none";
    pendingAIResult = null;

    try {
      let result = await fetchAI(content, apiKey);

      // 파싱 실패 또는 API 오류 시 1회 자동 재시도
      if (result === null || result === "API_ERROR") {
        console.log("[AI 다이어리] 첫 시도 실패, 재시도 중...");
        result = await fetchAI(content, apiKey);
      }

      // 인증/한도 오류는 이미 toast 표시됨
      if (result === "AUTH_ERROR" || result === "RATE_LIMIT" || result === "API_ERROR") {
        hideAIResult();
        btnSendAI.disabled = false;
        return;
      }

      const parsed = result || FALLBACK;
      pendingAIResult = parsed;
      showAIResult(parsed, true);
    } catch (err) {
      console.error("[AI 다이어리] fetch 오류:", err);
      showToast("연결을 확인해주세요", "error");
      hideAIResult();
    }

    btnSendAI.disabled = diaryTextarea.value.trim().length === 0;
  }

  function saveDiary() {
    if (!pendingAIResult) return;
    const today = getTodayStr();
    if (currentDateStr !== today) return;

    const entries = getEntries();
    const content = diaryTextarea.value.trim();
    const now = new Date().toISOString();
    const idx = entries.findIndex(e => e.date === today);

    const entry = {
      id: today,
      date: today,
      dateLabel: formatDateLabel(today),
      content,
      emotions: pendingAIResult.emotions || [],
      aiResponse: pendingAIResult.message || "",
      createdAt: idx >= 0 ? entries[idx].createdAt : now,
      updatedAt: now
    };

    if (idx >= 0) {
      entries[idx] = entry;
    } else {
      entries.push(entry);
    }

    saveEntries(entries);
    pendingAIResult = null;
    showToast("오늘 일기가 저장되었어요 💛", "success");
    saveButtonWrap.style.display = "none";
    renderHistory();
  }

  function openSettingsModal(required = false) {
    apiKeyInput.value = getApiKey();
    modalOverlay.classList.add("open");
    if (required) {
      document.querySelector(".modal-desc").textContent =
        "API 키가 없어요. OpenRouter API 키를 입력해주세요.";
    } else {
      document.querySelector(".modal-desc").textContent =
        "OpenRouter API 키를 입력하세요. 키는 브라우저 로컬 스토리지에만 저장됩니다.";
    }
    apiKeyInput.focus();
  }

  function closeSettingsModal() {
    modalOverlay.classList.remove("open");
  }

  // Init
  function init() {
    if (!localStorage.getItem("openrouter_api_key")) {
      localStorage.setItem("openrouter_api_key", DEFAULT_API_KEY);
    }

    const today = getTodayStr();
    currentDateStr = today;
    renderDateLabel(today);
    renderHistory();

    const entries = getEntries();
    const todayEntry = entries.find(e => e.date === today);
    if (todayEntry) {
      diaryTextarea.value = todayEntry.content || "";
      charCount.textContent = `${(todayEntry.content||"").length} / 2000`;
      if (todayEntry.aiResponse) {
        showAIResult({ emotions: todayEntry.emotions || [], message: todayEntry.aiResponse }, false);
      }
    } else {
      diaryTextarea.value = "";
      charCount.textContent = "0 / 2000";
    }

    btnSendAI.disabled = diaryTextarea.value.trim().length === 0;
  }

  // Event listeners
  diaryTextarea.addEventListener("input", () => {
    const len = diaryTextarea.value.length;
    charCount.textContent = `${len} / 2000`;
    btnSendAI.disabled = diaryTextarea.value.trim().length === 0;
  });

  btnSendAI.addEventListener("click", callAI);
  btnSave.addEventListener("click", saveDiary);

  btnSettings.addEventListener("click", () => openSettingsModal(false));
  btnModalCancel.addEventListener("click", closeSettingsModal);
  modalOverlay.addEventListener("click", (e) => {
    if (e.target === modalOverlay) closeSettingsModal();
  });

  btnModalSave.addEventListener("click", () => {
    const val = apiKeyInput.value.trim();
    if (!val) { showToast("API 키를 입력해주세요", "error"); return; }
    localStorage.setItem("openrouter_api_key", val);
    showToast("API 키가 저장되었어요", "success");
    closeSettingsModal();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeSettingsModal();
  });

  init();
</script>
</body>
</html>
